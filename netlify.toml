# Configuração do Netlify — site estático (sem build)
# A Palavra do Dia publica a pasta raiz diretamente.

[build]
  publish = "."
  command = ""

# Cabeçalhos de segurança e cache (espelham o arquivo _headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
